# =============================================================================
# Starium Orchestra — Docker Compose
# =============================================================================
#
# Usage :
#   docker compose up -d
#       → PostgreSQL uniquement (port 5432). Lancer API/Web en local avec pnpm
#         (voir README) en pointant DATABASE_URL sur cette base.
#
#   docker compose --profile standard up -d
#       → PostgreSQL + API (3001) + Web (hôte 3002 → conteneur 3000), images
#         buildées (prod-like), pas de bind mount. Le port hôte 3002 est volontaire
#         (évite un conflit avec un autre process sur :3000). Le navigateur appelle
#         l’API sur :3001 ; NEXT_PUBLIC_API_URL=http://localhost:3001.
#
# Hot reload : hors Docker (`pnpm` dans apps/api et apps/web), pas de service dédié.
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: "postgresql://starium:starium@postgres:5432/starium"
  PORT: "3001"
  JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
  MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
  MFA_KEY_VERSION: ${MFA_KEY_VERSION:-1}

x-depends-postgres-healthy: &depends-postgres-healthy
  postgres:
    condition: service_healthy

x-depends-postgres-minio-started: &depends-postgres-minio-started
  postgres:
    condition: service_healthy
  minio:
    condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  # RFC-034 — MinIO S3-compatible, réseau Docker uniquement (pas de ports hôte).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-starium_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-starium_minio_dev_only}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-base-env
      # Fallback S3/MinIO (RFC-034) — la config DB plateforme prime si `enabled`.
      PROCUREMENT_S3_ENDPOINT: http://minio:9000
      PROCUREMENT_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-starium_minio}
      PROCUREMENT_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-starium_minio_dev_only}
      PROCUREMENT_S3_BUCKET: ${PROCUREMENT_S3_BUCKET:-starium-procurement}
      PROCUREMENT_S3_REGION: ${PROCUREMENT_S3_REGION:-us-east-1}
      PROCUREMENT_S3_USE_SSL: "false"
      PROCUREMENT_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "3001:3001"
    depends_on: *depends-postgres-minio-started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.createConnection({host:'127.0.0.1',port:3001},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 180s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      # 3002 hôte → 3000 conteneur (volontaire : libère :3000 sur la machine)
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres_data: {}
  minio_data: {}