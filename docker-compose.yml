# =============================================================================
# Starium Orchestra — Docker Compose (FIX JWT HARD)
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
  PORT: 3001
  JWT_SECRET: "9f8d7s6f5d4s3f2d1s0f9d8s7f6d5s4f"
  JWT_ACCESS_EXPIRATION: 900
  JWT_REFRESH_EXPIRATION: 604800

x-web-base-env: &web-base-env
  DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
  PORT: 3001
  JWT_SECRET: "9f8d7s6f5d4s3f2d1s0f9d8s7f6d5s4f"
  JWT_ACCESS_EXPIRATION: 900
  JWT_REFRESH_EXPIRATION: 604800
  NEXT_PUBLIC_API_URL: https://api.starium.fr

x-depends-postgres-healthy: &depends-postgres-healthy
  postgres:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-base-env
    ports:
      - "3001:3001"
    depends_on: *depends-postgres-healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      <<: *web-base-env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data: {}