# =============================================================================
# Starium Orchestra — Docker Compose
# =============================================================================
#
# Usage :
#   docker compose up -d
#       → PostgreSQL uniquement (port 5432). Lancer API/Web en local avec pnpm
#         (voir README) en pointant DATABASE_URL sur cette base.
#
#   docker compose --profile standard up -d
#       → PostgreSQL + API (3001) + Web (hôte 3002 → conteneur 3000), images
#         buildées (prod-like), pas de bind mount. Le port hôte 3002 est volontaire
#         (évite un conflit avec un autre process sur :3000). Le navigateur appelle
#         l’API sur :3001 ; NEXT_PUBLIC_API_URL=http://localhost:3001.
#
# Hot reload : hors Docker (`pnpm` dans apps/api et apps/web), pas de service dédié.
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
  PORT: "3001"
  JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}

x-depends-postgres-healthy: &depends-postgres-healthy
  postgres:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-base-env
    ports:
      - "3001:3001"
    depends_on: *depends-postgres-healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.createConnection({host:'127.0.0.1',port:3001},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 180s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      # 3002 hôte → 3000 conteneur (volontaire : libère :3000 sur la machine)
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres_data: {}