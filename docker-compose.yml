# =============================================================================
# Starium Orchestra — Docker Compose
# =============================================================================
#
# Usage :
#   docker compose up -d
#       → PostgreSQL uniquement (port 5432). Lancer API/Web en local avec pnpm
#         (voir README) en pointant DATABASE_URL sur cette base.
#
#   docker compose --profile standard up -d
#       → PostgreSQL + Redis + API (3001) + Web (hôte 3002 → conteneur 3000), images
#         buildées (prod-like), pas de bind mount. Le port hôte 3002 est volontaire
#         (évite un conflit avec un autre process sur :3000). Le navigateur appelle
#         l’API sur :3001 ; NEXT_PUBLIC_API_URL=http://localhost:3001.
#         Variables injectées : voir `x-api-base-env` + bloc `api.environment` (interpolation
#         depuis le `.env` à la racine du repo, même nom que pour `docker compose config`).
#         Vérifier dans le conteneur : `docker compose exec api sh -lc 'env | sort | grep -E \"^(SMTP_|EMAIL_|REDIS_|JWT_)\"'`.
#         E-mails en file (RFC-038) : lancer aussi `pnpm start:worker` (hors compose) ou un service worker dédié.
#
# Hot reload : hors Docker (`pnpm` dans apps/api et apps/web), pas de service dédié.
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: "postgresql://starium:starium@postgres:5432/starium"
  PORT: "3001"
  # Image API : NODE_ENV=production dans Dockerfile ; ici pour visibilité `compose config`.
  NODE_ENV: production
  JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
  MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
  MFA_KEY_VERSION: ${MFA_KEY_VERSION:-1}
  # BullMQ / RFC-038 : hostname du service Compose (pas 127.0.0.1 dans le conteneur).
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  # SMTP — secrets via `.env` racine (ne pas committer). Mail sans auth : laisser USER/PASS vides.
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SMTP_TIMEOUT_MS: ${SMTP_TIMEOUT_MS:-10000}
  # Vérification identités e-mail (MeService) — URLs HTTPS obligatoires en vrai prod.
  EMAIL_IDENTITY_VERIFY_SUCCESS_URL: ${EMAIL_IDENTITY_VERIFY_SUCCESS_URL:-}
  EMAIL_IDENTITY_VERIFY_ERROR_URL: ${EMAIL_IDENTITY_VERIFY_ERROR_URL:-}
  EMAIL_IDENTITY_VERIFY_TOKEN_TTL_HOURS: ${EMAIL_IDENTITY_VERIFY_TOKEN_TTL_HOURS:-24}
  EMAIL_IDENTITY_VERIFY_RESEND_COOLDOWN_MINUTES: ${EMAIL_IDENTITY_VERIFY_RESEND_COOLDOWN_MINUTES:-15}
  # Ignoré en prod côté app ; laisser vide. Dev seulement.
  STARIUM_SKIP_EMAIL_IDENTITY_RESEND_COOLDOWN: ${STARIUM_SKIP_EMAIL_IDENTITY_RESEND_COOLDOWN:-}
  EMAIL_DELIVERIES_INLINE: ${EMAIL_DELIVERIES_INLINE:-}

x-redis-healthcheck: &redis-healthcheck
  test: ["CMD", "redis-cli", "ping"]
  interval: 2s
  timeout: 3s
  retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck: *redis-healthcheck

  # RFC-035 — MinIO optionnel (profil `procurement-s3`) si stockage objet S3 en Docker.
  minio:
    profiles: ["procurement-s3"]
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-starium_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-starium_minio_dev_only}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-base-env
      MICROSOFT_M365_SYNC_REDIRECT_URI: ${MICROSOFT_M365_SYNC_REDIRECT_URI:-}
      # RFC-035 — le driver suit la ligne plateforme (admin). PROCUREMENT_STORAGE_DRIVER : repli sans cette ligne uniquement.
      PROCUREMENT_LOCAL_ROOT: /data/procurement-blobs
      # S3 : variables via `.env` à la racine du compose (interpolation). Région alignée sur la console AWS (ex. eu-west-3).
      PROCUREMENT_S3_ENDPOINT: ${PROCUREMENT_S3_ENDPOINT:-}
      PROCUREMENT_S3_ACCESS_KEY: ${PROCUREMENT_S3_ACCESS_KEY:-}
      PROCUREMENT_S3_SECRET_KEY: ${PROCUREMENT_S3_SECRET_KEY:-}
      PROCUREMENT_S3_BUCKET: ${PROCUREMENT_S3_BUCKET:-starium-procurement}
      PROCUREMENT_S3_REGION: ${PROCUREMENT_S3_REGION:-}
      PROCUREMENT_S3_USE_SSL: ${PROCUREMENT_S3_USE_SSL:-false}
      PROCUREMENT_S3_FORCE_PATH_STYLE: ${PROCUREMENT_S3_FORCE_PATH_STYLE:-true}
    ports:
      - "3001:3001"
    volumes:
      - procurement_blobs:/data/procurement-blobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.createConnection({host:'127.0.0.1',port:3001},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 180s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      # 3002 hôte → 3000 conteneur (volontaire : libère :3000 sur la machine)
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres_data: {}
  minio_data: {}
  procurement_blobs: {}