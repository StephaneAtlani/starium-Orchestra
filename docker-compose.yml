# Environnements :
#   docker compose up                    → postgres + api (3001) + web (3000)
#   docker compose --profile dev up      → postgres + api-dev (3002) + web-dev (3000), hot reload
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # api-dev : JWT etc. via env_file ; DATABASE_URL et PORT forcés ici (environment écrase env_file).
  api-dev:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
      PORT: "3001"
    ports:
      - "3002:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Full-stack dev : frontend pointe vers api-dev (port 3002). Utiliser avec --profile dev.
  web-dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002
    ports:
      - "3000:3000"
    depends_on:
      - api-dev
    profiles:
      - dev

volumes:
  postgres_data: {}
