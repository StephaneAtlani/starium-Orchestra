# =============================================================================
# Starium Orchestra — Docker Compose
# =============================================================================
#
# Usage :
#   docker compose up -d
#       → PostgreSQL uniquement (port 5432). Lancer API/Web en local avec pnpm
#         (voir README) en pointant DATABASE_URL sur cette base.
#
#   docker compose --profile standard up -d
#       → PostgreSQL + API (3001) + Web (3000), images buildées (prod-like),
#         pas de bind mount. NEXT_PUBLIC_API_URL=http://localhost:3001 pour le navigateur.
#
# Hot reload : hors Docker (`pnpm` dans apps/api et apps/web), pas de service dédié.
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
  PORT: "3001"

x-depends-postgres-healthy: &depends-postgres-healthy
  postgres:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-base-env
    ports:
      - "3001:3001"
    depends_on: *depends-postgres-healthy
    profiles:
      - standard

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3002:3000"
    depends_on:
      - api
    profiles:
      - standard

volumes:
  postgres_data: {}
