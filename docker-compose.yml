# =============================================================================
# Starium Orchestra — Docker Compose (FIX JWT + Dokploy)
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: ${DATABASE_URL:-postgresql://starium:starium@postgres:5432/starium}
  PORT: ${PORT:-3001}
  JWT_SECRET: ${JWT_SECRET:-dev_fallback_secret_please_change}
  JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900}
  JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800}

x-depends-postgres-healthy: &depends-postgres-healthy
  postgres:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-base-env
    ports:
      - "3001:3001"
    depends_on: *depends-postgres-healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres_data: {}