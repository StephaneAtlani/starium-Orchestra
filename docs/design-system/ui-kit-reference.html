</head>
<body>
<div id="root"></div>
<script>
  // Apply default theme + font on .app root (selector UI removed).
  (function () {
    function apply() {
      const app = document.querySelector('.app');
      if (app) {
        app.setAttribute('data-theme', 'B');
        app.setAttribute('data-menu', 'light');
        app.setAttribute('data-font', 'F2');
      }
    }
    const obs = new MutationObserver(() => {
      if (document.querySelector('.app')) { apply(); obs.disconnect(); }
    });
    obs.observe(document.getElementById('root'), { childList: true, subtree: true });
  })();
</script>
