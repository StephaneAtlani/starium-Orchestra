  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

r { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #E9E6E0; padding-bottom: 20px; margin-bottom: 40px; }\n.doc-header-logo img { height: 20px; opacity: .5; }\n.doc-header-txt { font-size: 11px; color: #B6B0A4; text-align: right; line-height: 1.6; }\n.chapter-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #E8A317; margin-bottom: 10px; }\nh2.doc { font-size: 28px; font-weight: 800; letter-spacing: -.025em; margin-bottom: 8px; }\n.doc-intro { font-size: 15px; color: #5F5A52; line-height: 1.65; margin-bottom: 32px; font-weight: 400; border-left: 3px solid #E8A317; padding-left: 16px; }\nh3.doc { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #403D38; margin: 32px 0 12px; }\np.body { font-size: 14px; color: #403D38; line-height: 1.7; margin-bottom: 14px; }\n.rule { height: 1px; background: #E9E6E0; margin: 28px 0; }\nul.doc { padding-left: 0; list-style: none; }\nul.doc li { font-size: 14px; color: #403D38; line-height: 1.65; padding: 6px 0 6px 20px; border-bottom: 1px solid #F4F2EE; position: relative; }\nul.doc li:last-child { border-bottom: none; }\nul.doc li::before { content: '✦'; position: absolute; left: 0; color: #E8A317; font-size: 10px; top: 8px; }\n.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 16px 0; }\n.info-box { background: #FAF9F7; border: 1px solid #E9E6E0; border-radius: 8px; padding: 16px 18px; }\n.info-box-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #8C8579; margin-bottom: 6px; }\n.info-box-val { font-size: 14px; font-weight: 600; color: #0E0E10; }\n.info-box-sub { font-size: 12px; color: #8C8579; margin-top: 2px; }\n\n/* Color swatches inline */\n.swatch-row { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }\n.sw { width: 48px; border-radius: 6px; overflow: hidden; }\n.sw-color { height: 36px; }\n.sw-hex { font-size: 9.5px; font-family: monospace; color: #8C8579; padding: 3px 4px; background: #fff; border: 1px solid #E9E6E0; border-top: none; text-align: center; }\n\n/* Table */\ntable.doc { width: 100%; border-collapse: collapse; font-size: 13px; margin: 12px 0; }\ntable.doc th { text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #8C8579; padding: 8px 10px; border-bottom: 2px solid #E9E6E0; }\ntable.doc td { padding: 10px 10px; border-bottom: 1px solid #F4F2EE; color: #403D38; vertical-align: top; }\ntable.doc tr:last-child td { border-bottom: none; }\ntable.doc td strong { color: #0E0E10; font-weight: 600; }\n.mono { font-family: 'Courier New', monospace; font-size: 12px; background: #F4F2EE; padding: 1px 5px; border-radius: 3px; color: #5F3F00; }\n\n/* Do / Don't */\n.dd { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }\n.dd-box { border-radius: 7px; overflow: hidden; }\n.dd-hd { padding: 7px 12px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }\n.dd-do .dd-hd { background: #E6F4ED; color: #1F8A5B; }\n.dd-dont .dd-hd { background: #FBE8E6; color: #B42318; }\n.dd-body { padding: 12px; font-size: 13px; line-height: 1.55; color: #403D38; background: #FAF9F7; border: 1px solid #E9E6E0; border-top: none; }\n\n/* Footer */\n.doc-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #E9E6E0; padding-top: 16px; margin-top: 40px; font-size: 11px; color: #B6B0A4; }\n\n@media print {\n  body { background: none; padding: 0; }\n  .page { box-shadow: none; border-radius: 0; margin: 0; max-width: none; }\n  @page { margin: 0.75in; }\n  .page { break-after: page; }\n  .page:last-child { break-after: auto; }\n  h3.doc { break-after: avoid; }\n  table.doc tr { break-inside: avoid; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- PAGE 1 — COUVERTURE -->\n<div class=\"page\">\n  <div class=\"cover-meta\">\n    <span>Starium Orchestra · Design System<\u002Fspan>\n    <span>Version 1.0 · Juin 2026<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"cover-star\">✦<\u002Fdiv>\n  <h1 class=\"cover\">Charte<br>Design<br>System<\u002Fh1>\n  <p class=\"cover-sub\">Référence officielle pour concevoir, développer et maintenir des interfaces cohérentes avec l'identité Starium.<\u002Fp>\n  <div class=\"cover-divider\"><\u002Fdiv>\n  <div class=\"cover-grid\">\n    <div class=\"cover-stat\"><div class=\"cover-stat-val\">93<\u002Fdiv><div class=\"cover-stat-lbl\">Tokens CSS documentés<\u002Fdiv><\u002Fdiv>\n    <div class=\"cover-stat\"><div class=\"cover-stat-val\">12<\u002Fdiv><div class=\"cover-stat-lbl\">Chapitres<\u002Fdiv><\u002Fdiv>\n    <div class=\"cover-stat\"><div class=\"cover-stat-val\">v1.0<\u002Fdiv><div class=\"cover-stat-lbl\">Première édition<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cover-footer\">\n    <img src=\"52a9340b-4bde-4225-b783-332e9b701be5\" alt=\"Starium\">\n    <span class=\"cover-footer-txt\">Confidentiel · Usage interne<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PAGE 2 — IDENTITÉ -->\n<div class=\"page\">\n  <div class=\"doc-header\">\n    <div class=\"doc-header-logo\"><img src=\"52a9340b-4bde-4225-b783-332e9b701be5\" alt=\"Starium\"><\u002Fdiv>\n    <div class=\"doc-header-txt\">Charte Design System · v1.0<br>Chapitre 1 — Identité<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chapter-label\">Chapitre 01<\u002Fdiv>\n  <h2 class=\"doc\">Identité de marque<\u002Fh2>\n  <p class=\"doc-intro\">Starium est une plateforme SaaS de pilotage des directions, projets, budgets et ressources. La marque vise la sobriété et la performance d'Apple, réchauffée par une signature dorée distinctive.<\u002Fp>\n\n  <h3 class=\"doc\">Positionnement<\u002Fh3>\n  <p class=\"body\"><strong>Nom :<\u002Fstrong> Starium &nbsp;·&nbsp; <strong>Baseline :<\u002Fstrong> <em>Révélez vos talents.<\u002Fem><\u002Fp>\n  <p class=\"body\">La marque s'adresse aux CODIR, COMEX et directions de projet. Le ton est calme, posé, orienté résultat. On ne crie pas — on aligne.<\u002Fp>\n\n  <h3 class=\"doc\">Les trois piliers visuels<\u002Fh3>\n  <ul class=\"doc\">\n    <li><strong>Le wordmark<\u002Fstrong> — <em>Starium<\u002Fem> en très gros gras (800), lettres rondes, tracking serré. Jamais allongé, jamais penché.<\u002Fli>\n    <li><strong>Le monogramme<\u002Fstrong> — Quatre lobes noirs en rotation autour d'un point doré central en forme de scintillement à 4 branches.<\u002Fli>\n    <li><strong>L'étoile ✦<\u002Fstrong> — U+2726, seul ornement graphique autorisé. Puce visuelle, titre de section. Toujours en or (#E8A317).<\u002Fli>\n  <\u002Ful>\n\n  <h3 class=\"doc\">Principes fondateurs<\u002Fh3>\n  <div class=\"two-col\">\n    <div class=\"info-box\"><div class=\"info-box-label\">Sobriété<\u002Fdiv><div class=\"info-box-val\">Moins c'est plus<\u002Fdiv><div class=\"info-box-sub\">Chaque élément doit justifier sa présence<\u002Fdiv><\u002Fdiv>\n    <div class=\"info-box\"><div class=\"info-box-label\">Alignement<\u002Fdiv><div class=\"info-box-val\">Tout est cohérent<\u002Fdiv><div class=\"info-box-sub\">Un seul système, une seule source de vérité<\u002Fdiv><\u002Fdiv>\n    <div class=\"info-box\"><div class=\"info-box-label\">Décision<\u002Fdiv><div class=\"info-box-val\">Orienté résultat<\u002Fdiv><div class=\"info-box-sub\">L'UI facilite l'arbitrage, pas la contemplation<\u002Fdiv><\u002Fdiv>\n    <div class=\"info-box\"><div class=\"info-box-label\">Premium<\u002Fdiv><div class=\"info-box-val\">L'espace est un signal<\u002Fdiv><div class=\"info-box-sub\">Marges généreuses, hiérarchie tendue<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"doc-footer\">\n    <span>Starium Design System · Confidentiel<\u002Fspan>\n    <span>Page 2<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PAGE 3 — VOIX & CONTENU -->\n<div class=\"page\">\n  <div class=\"doc-header\">\n    <div class=\"doc-header-logo\"><img src=\"52a9340b-4bde-4225-b783-332e9b701be5\" alt=\"Starium\"><\u002Fdiv>\n    <div class=\"doc-header-txt\">Charte Design System · v1.0<br>Chapitre 2 — Voix &amp; Contenu<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chapter-label\">Chapitre 02<\u002Fdiv>\n  <h2 class=\"doc\">Voix &amp; contenu<\u002Fh2>\n  <p class=\"doc-intro\">La voix Starium est calme, posée, experte. On ne survend pas. On constate, on aligne, on décide.<\u002Fp>\n\n  <h3 class=\"doc\">Règles de casse<\u002Fh3>\n  <table class=\"doc\">\n    <thead><tr><th>Contexte<\u002Fth><th>Règle<\u002Fth><th>Exemple<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Titres &amp; sous-titres<\u002Fstrong><\u002Ftd><td>Sentence case<\u002Ftd><td>« Vision stratégique 2026 »<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Boutons &amp; CTA<\u002Fstrong><\u002Ftd><td>Sentence case<\u002Ftd><td>« Modifier la vision »<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Overlines / sections<\u002Fstrong><\u002Ftd><td>UPPERCASE tracké<\u002Ftd><td>GOUVERNANCE · PILOTAGE<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Statuts<\u002Fstrong><\u002Ftd><td>Sentence case<\u002Ftd><td>En cours · En retard · Terminé<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 class=\"doc\">Format des données<\u002Fh3>\n  <div class=\"two-col\">\n    <div>\n      <p class=\"body\" style=\"font-size:13px\"><strong>Milliers :<\u002Fstrong> espace fine — <span class=\"mono\">1 240<\u002Fspan><\u002Fp>\n      <p class=\"body\" style=\"font-size:13px\"><strong>Pourcentage :<\u002Fstrong> collé — <span class=\"mono\">82 %<\u002Fspan><\u002Fp>\n      <p class=\"body\" style=\"font-size:13px\"><strong>Monnaie :<\u002Fstrong> après — <span class=\"mono\">1 240 €<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <p class=\"body\" style=\"font-size:13px\"><strong>Date longue :<\u002Fstrong> <span class=\"mono\">15 mai 2026<\u002Fspan><\u002Fp>\n      <p class=\"body\" style=\"font-size:13px\"><strong>Date courte :<\u002Fstrong> <span class=\"mono\">31 déc. 2026<\u002Fspan><\u002Fp>\n      <p class=\"body\" style=\"font-size:13px\"><strong>Trimestre :<\u002Fstrong> <span class=\"mono\">T1 2025<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 class=\"doc\">À faire / À éviter<\u002Fh3>\n  <div class=\"dd\">\n    <div class=\"dd-box dd-do\"><div class=\"dd-hd\">✓ Correct<\u002Fdiv><div class=\"dd-body\">« Définir notre cap, aligner l'organisation et créer de la valeur durable. »<br><br>Vouvoiement professionnel, verbes d'action, apostrophes typographiques.<\u002Fdiv><\u002Fdiv>\n    <div class=\"dd-box dd-dont\"><div class=\"dd-hd\">✗ Incorrect<\u002Fdiv><div class=\"dd-body\">« 🚀 Boostez votre performance ! »<br><br>Emoji, point d'exclamation, registre publicitaire, tutoiement.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 class=\"doc\">Verbes d'action autorisés<\u002Fh3>\n  <p class=\"body\">Aligner · Piloter · Décider · Arbitrer · Révéler · Sécuriser · Consolider · Anticiper · Prioriser · Arbitrer · Partager · Évaluer<\u002Fp>\n\n  <div class=\"doc-footer\">\n    <span>Starium Design System · Confidentiel<\u002Fspan>\n    <span>Page 3<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PAGE 4 — COULEURS -->\n<div class=\"page\">\n  <div class=\"doc-header\">\n    <div class=\"doc-header-logo\"><img src=\"52a9340b-4bde-4225-b783-332e9b701be5\" alt=\"Starium\"><\u002Fdiv>\n    <div class=\"doc-header-txt\">Charte Design System · v1.0<br>Chapitre 3 — Couleurs<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chapter-label\">Chapitre 03<\u002Fdiv>\n  <h2 class=\"doc\">Couleurs<\u002Fh2>\n  <p class=\"doc-intro\">Un seul accent — l'or ambre brûlé — sur une base de neutres papier chauds. Jamais de gris bleutés froids.<\u002Fp>\n\n  <h3 class=\"doc\">Or Starium — accent principal<\u002Fh3>\n  <div class=\"swatch-row\">\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#FBEAB5\"><\u002Fdiv><div class=\"sw-hex\">#FBEAB5<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#F4D58A\"><\u002Fdiv><div class=\"sw-hex\">#F4D58A<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\" style=\"position:relative\"><div class=\"sw-color\" style=\"background:#E8A317\"><\u002Fdiv><div class=\"sw-hex\" style=\"font-weight:700;color:#5F3F00\">#E8A317 ★<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#CC8E0E\"><\u002Fdiv><div class=\"sw-hex\">#CC8E0E<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#5F3F00\"><\u002Fdiv><div class=\"sw-hex\" style=\"color:#fff;background:#5F3F00\">#5F3F00<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 class=\"doc\">Encre &amp; neutres papier<\u002Fh3>\n  <div class=\"swatch-row\">\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#0E0E10;border:1px solid #333\"><\u002Fdiv><div class=\"sw-hex\" style=\"color:#fff;background:#0E0E10\">#0E0E10<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#FAF9F7;border:1px solid #E9E6E0\"><\u002Fdiv><div class=\"sw-hex\">#FAF9F7<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#F4F2EE\"><\u002Fdiv><div class=\"sw-hex\">#F4F2EE<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#E9E6E0\"><\u002Fdiv><div class=\"sw-hex\">#E9E6E0<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#8C8579\"><\u002Fdiv><div class=\"sw-hex\">#8C8579<\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"sw-color\" style=\"background:#403D38\"><\u002Fdiv><div class=\"sw-hex\" style=\"color:#fff;background:#403D38\">#403D38<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 class=\"doc\">États sémantiques<\u002Fh3>\n  <table class=\"doc\">\n    <thead><tr><th>Couleur<\u002Fth><th>Texte<\u002Fth><th>Fond<\u002Fth><th>Usage<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong style=\"color:#1F8A5B\">Succès<\u002Fstrong><\u002Ftd><td><span class=\"mono\">#1F8A5B<\u002Fspan><\u002Ftd><td><span class=\"mono\">#E6F4ED<\u002Fspan><\u002Ftd><td>Terminé, OK, objectif atteint<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"color:#C77A00\">Attention<\u002Fstrong><\u002Ftd><td><span class=\"mono\">#C77A00<\u002Fspan><\u002Ftd><td><span class=\"mono\">#FFF1DC<\u002Fspan><\u002Ftd><td>Alerte non critique, retard léger<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"color:#B42318\">Danger<\u002Fstrong><\u002Ftd><td><span class=\"mono\">#B42318<\u002Fspan><\u002Ftd><td><span class=\"mono\">#FBE8E6<\u002Fspan><\u002Ftd><td>Erreur, risque critique, retard<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"color:#2A6FDB\">Info<\u002Fstrong><\u002Ftd><td><span class=\"mono\">#2A6FDB<\u002Fspan><\u002Ftd><td><span class=\"mono\">#E3EEFB<\u002Fspan><\u002Ftd><td>Information neutre, en révision<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 class=\"doc\">Règle d'or<\u002Fh3>\n  <p class=\"body\">L'or (#E8A317) est un signal — s'il est partout, il ne signifie plus rien. Il est réservé aux CTA primaires, items actifs, icônes KPI et valeurs clés. <strong>Jamais en fond plein de grande surface.<\u002Fstrong><\u002Fp>\n\n  <div class=\"doc-footer\">\n    <span>Starium Design System · Confidentiel<\u002Fspan>\n    <span>Page 4<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PAGE 5 — TYPOGRAPHIE & ESPACEMENT -->\n<div class=\"page\">\n  <div class=\"doc-header\">\n    <div class=\"doc-header-logo\"><img src=\"52a9340b-4bde-4225-b783-332e9b701be5\" alt=\"Starium\"><\u002Fdiv>\n    <div class=\"doc-header-txt\">Charte Design System · v1.0<br>Chapitre 4 — Typographie &amp; Espacement<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chapter-label\">Chapitre 04<\u002Fdiv>\n  <h2 class=\"doc\">Typographie &amp; Espacement<\u002Fh2>\n  <p class=\"doc-intro\">Famille unique Manrope (variable, auto-hébergée) pour tout l'UI. Hiérarchie tendue — on saute des paliers, on ne dilue pas.<\u002Fp>\n\n  <h3 class=\"doc\">Échelle typographique<\u002Fh3>\n  <table class=\"doc\">\n    <thead><tr><th>Rôle<\u002Fth><th>Token<\u002Fth><th>Valeur<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong style=\"font-size:22px;letter-spacing:-.025em;font-weight:800\">Display XL<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--text-display-xl<\u002Fspan><\u002Ftd><td>800 · 64px / 1.05 · tracking −0.03em<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"font-size:18px;letter-spacing:-.02em;font-weight:800\">Display M<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--text-display-m<\u002Fspan><\u002Ftd><td>700 · 36px / 1.12 · tracking −0.02em<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"font-size:16px;font-weight:700\">H1<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--text-h1<\u002Fspan><\u002Ftd><td>700 · 28px / 1.2<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"font-size:14px;font-weight:700\">H2<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--text-h2<\u002Fspan><\u002Ftd><td>700 · 22px / 1.25<\u002Ftd><\u002Ftr>\n      <tr><td><span style=\"font-size:14px\">Body<\u002Fspan><\u002Ftd><td><span class=\"mono\">--text-body<\u002Fspan><\u002Ftd><td>400 · 15px / 1.55<\u002Ftd><\u002Ftr>\n      <tr><td><span style=\"font-size:12px\">Body S<\u002Fspan><\u002Ftd><td><span class=\"mono\">--text-body-s<\u002Fspan><\u002Ftd><td>400 · 13px / 1.5<\u002Ftd><\u002Ftr>\n      <tr><td><span style=\"font-size:11px;color:#8C8579\">Caption<\u002Fspan><\u002Ftd><td><span class=\"mono\">--text-caption<\u002Fspan><\u002Ftd><td>500 · 12px / 1.4<\u002Ftd><\u002Ftr>\n      <tr><td><span style=\"font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:#8C8579\">OVERLINE<\u002Fspan><\u002Ftd><td><span class=\"mono\">--text-overline<\u002Fspan><\u002Ftd><td>600 · 11px · uppercase · tracking 0.08em<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 class=\"doc\">Espacement — base 4px<\u002Fh3>\n  <div class=\"two-col\">\n    <div>\n      <p class=\"body\" style=\"font-size:13px;line-height:2\"><span class=\"mono\">--space-1<\u002Fspan> → 4px &nbsp; <span class=\"mono\">--space-2<\u002Fspan> → 8px<br><span class=\"mono\">--space-3<\u002Fspan> → 12px &nbsp; <span class=\"mono\">--space-4<\u002Fspan> → 16px<br><span class=\"mono\">--space-5<\u002Fspan> → 20px &nbsp; <span class=\"mono\">--space-6<\u002Fspan> → 24px<br><span class=\"mono\">--space-8<\u002Fspan> → 32px &nbsp; <span class=\"mono\">--space-10<\u002Fspan> → 40px<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <p class=\"body\" style=\"font-size:13px;line-height:2\"><span class=\"mono\">--space-12<\u002Fspan> → 48px<br><span class=\"mono\">--space-16<\u002Fspan> → 64px<br><span class=\"mono\">--sidebar-width<\u002Fspan> → 248px<br><span class=\"mono\">--topbar-height<\u002Fspan> → 64px<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 class=\"doc\">Rayons &amp; Ombres<\u002Fh3>\n  <table class=\"doc\">\n    <thead><tr><th>Token<\u002Fth><th>Valeur<\u002Fth><th>Usage<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><span class=\"mono\">--radius-md<\u002Fspan><\u002Ftd><td>10px<\u002Ftd><td>Boutons, inputs<\u002Ftd><\u002Ftr>\n      <tr><td><span class=\"mono\">--radius-lg<\u002Fspan><\u002Ftd><td>14px ★<\u002Ftd><td>Cards — valeur signature<\u002Ftd><\u002Ftr>\n      <tr><td><span class=\"mono\">--radius-xl<\u002Fspan><\u002Ftd><td>20px<\u002Ftd><td>Modals, dialogs<\u002Ftd><\u002Ftr>\n      <tr><td><span class=\"mono\">--radius-pill<\u002Fspan><\u002Ftd><td>999px<\u002Ftd><td>Badges, avatars<\u002Ftd><\u002Ftr>\n      <tr><td><span class=\"mono\">--shadow-focus<\u002Fspan><\u002Ftd><td>0 0 0 3px rgba(232,163,23,.32)<\u002Ftd><td>Focus ring or — seule ombre colorée<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"doc-footer\">\n    <span>Starium Design System · Confidentiel<\u002Fspan>\n    <span>Page 5<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PAGE 6 — COMPOSANTS -->\n<div class=\"page\">\n  <div class=\"doc-header\">\n    <div class=\"doc-header-logo\"><img src=\"52a9340b-4bde-4225-b783-332e9b701be5\" alt=\"Starium\"><\u002Fdiv>\n    <div class=\"doc-header-txt\">Charte Design System · v1.0<br>Chapitre 5 — Composants &amp; Usage<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chapter-label\">Chapitre 05<\u002Fdiv>\n  <h2 class=\"doc\">Composants &amp; Règles d'usage<\u002Fh2>\n  <p class=\"doc-intro\">Chaque composant est défini par son token de fond, sa bordure, son rayon et son comportement hover/focus. Aucun composant n'échappe au système.<\u002Fp>\n\n  <h3 class=\"doc\">Boutons<\u002Fh3>\n  <table class=\"doc\">\n    <thead><tr><th>Variante<\u002Fth><th>Fond<\u002Fth><th>Texte<\u002Fth><th>Usage<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Primaire<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--brand-gold<\u002Fspan><\u002Ftd><td><span class=\"mono\">--brand-ink<\u002Fspan><\u002Ftd><td>Action principale, CTA unique par écran<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Secondaire<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--bg-surface<\u002Fspan><\u002Ftd><td><span class=\"mono\">--fg-1<\u002Fspan><\u002Ftd><td>Action secondaire, export, annulation<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Ghost<\u002Fstrong><\u002Ftd><td>Transparent<\u002Ftd><td><span class=\"mono\">--fg-2<\u002Fspan><\u002Ftd><td>Action tertiaire, dans les toolbars<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Danger<\u002Fstrong><\u002Ftd><td><span class=\"mono\">--state-danger-bg<\u002Fspan><\u002Ftd><td><span class=\"mono\">--state-danger<\u002Fspan><\u002Ftd><td>Suppression, action irréversible<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 class=\"doc\">Sidebar<\u002Fh3>\n  <ul class=\"doc\">\n    <li>Fond <span class=\"mono\">#1A1814<\u002Fspan> — encre très profond, pas noir pur<\u002Fli>\n    <li>Texte des items : <span class=\"mono\">#FFFFFD<\u002Fspan> — blanc cassé doux<\u002Fli>\n    <li>Item actif : fond <span class=\"mono\">--brand-gold<\u002Fspan>, texte <span class=\"mono\">#1A1814<\u002Fspan>, poids 700<\u002Fli>\n    <li>Sections overline : blanc 28 % d'opacité, uppercase tracké<\u002Fli>\n    <li>Hover : fond blanc 6 % d'opacité<\u002Fli>\n  <\u002Ful>\n\n  <h3 class=\"doc\">Badges &amp; Statuts<\u002Fh3>\n  <table class=\"doc\">\n    <thead><tr><th>Statut<\u002Fth><th>Classe<\u002Fth><th>Fond / Texte<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong style=\"color:#5F3F00;background:#F4D58A;padding:2px 8px;border-radius:999px;font-size:12px\">En cours<\u002Fstrong><\u002Ftd><td><span class=\"mono\">.chip-gold<\u002Fspan><\u002Ftd><td>#F4D58A / #5F3F00<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"color:#1F8A5B;background:#E6F4ED;padding:2px 8px;border-radius:999px;font-size:12px\">Terminé<\u002Fstrong><\u002Ftd><td><span class=\"mono\">.chip-success<\u002Fspan><\u002Ftd><td>#E6F4ED / #1F8A5B<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"color:#B42318;background:#FBE8E6;padding:2px 8px;border-radius:999px;font-size:12px\">En retard<\u002Fstrong><\u002Ftd><td><span class=\"mono\">.chip-danger<\u002Fspan><\u002Ftd><td>#FBE8E6 / #B42318<\u002Ftd><\u002Ftr>\n      <tr><td><strong style=\"color:#C77A00;background:#FFF1DC;padding:2px 8px;border-radius:999px;font-size:12px\">Attention<\u002Fstrong><\u002Ftd><td><span class=\"mono\">.chip-warning<\u002Fspan><\u002Ftd><td>#FFF1DC / #C77A00<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 class=\"doc\">Motion<\u002Fh3>\n  <p class=\"body\">Discret. <span class=\"mono\">120ms<\u002Fspan> pour les micro-interactions hover, <span class=\"mono\">200ms<\u002Fspan> pour les transitions standard, <span class=\"mono\">320ms<\u002Fspan> pour les transitions de page et modals. Easing <span class=\"mono\">cubic-bezier(0.2, 0, 0, 1)<\u002Fspan> — entrée rapide, sortie qui s'étire. <strong>Pas de bounce, pas de spring, pas de loops décoratifs.<\u002Fstrong><\u002Fp>\n\n  <h3 class=\"doc\">Règles absolues<\u002Fh3>\n  <div class=\"dd\">\n    <div class=\"dd-box dd-do\"><div class=\"dd-hd\">✓ Toujours<\u002Fdiv><div class=\"dd-body\">Manrope · Lucide Icons outlined · Fond papier #FAF9F7 · Ombres encre noire · Focus ring or · Cards 14px radius<\u002Fdiv><\u002Fdiv>\n    <div class=\"dd-box dd-dont\"><div class=\"dd-hd\">✗ Jamais<\u002Fdiv><div class=\"dd-body\">Emoji dans l'UI · Gradients vifs · Ombres colorées · Fond plein or grande surface · Border gauche colorée · Gris bleutés<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"doc-footer\">\n    <span>Starium Design System · Confidentiel<\u002Fspan>\n    <span>Page 6<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- STYLES SUPPLÉMENTAIRES pour les pages specimens -->\n<style>\n/* ── Specimen layout ───────────────────────────── */\n.spec-row{display:flex;align-items:center;flex-wrap:wrap;gap:14px;margin:14px 0}\n.spec-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}\n.spec-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}\n.spec-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}\n.spec-grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0}\n.spec-area{background:#FAF9F7;border:1px solid #E9E6E0;border-radius:10px;padding:22px;margin:14px 0}\n.spec-area-dark{background:#1A1814;border-radius:10px;padding:22px;margin:14px 0}\n.spec-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#B6B0A4;margin-top:10px;text-align:center}\n\n/* ── Swatches ──────────────────────────────────── */\n.sw-lg{border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}\n.sw-lg-color{height:72px}\n.sw-lg-info{padding:10px 12px;background:#fff}\n.sw-lg-name{font-size:12.5px;font-weight:700;color:#0E0E10}\n.sw-lg-hex{font-family:'Courier New',monospace;font-size:11px;color:#8C8579;margin-top:2px}\n.sw-lg-token{font-family:'Courier New',monospace;font-size:10px;color:#B6B0A4;margin-top:1px}\n\n/* ── Buttons ───────────────────────────────────── */\n.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 18px;border-radius:10px;border:1px solid transparent;font-family:'Manrope',-apple-system,sans-serif;font-size:13px;font-weight:600;cursor:default;white-space:nowrap}\n.btn-p{background:#E8A317;color:#0E0E10;border-color:#E8A317}\n.btn-s{background:#fff;color:#0E0E10;border-color:#D6D2CA}\n.btn-g{background:transparent;color:#5F5A52;border-color:transparent}\n.btn-d{background:#FBE8E6;color:#B42318;border-color:#FBE8E6}\n.btn-sm{height:30px;padding:0 12px;font-size:12px;border-radius:6px}\n.btn-lg{height:46px;padding:0 24px;font-size:15px}\n.btn-dis{opacity:.4;cursor:not-allowed}\n.btn svg{width:14px;height:14px;flex-shrink:0}\n\n/* ── Badges ────────────────────────────────────── */\n.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;font-family:'Manrope',-apple-system,sans-serif}\n.chip-dot{width:6px;height:6px;border-radius:999px;flex-shrink:0}\n.c-gold{background:#F4D58A;color:#5F3F00}\n.c-ok{background:#E6F4ED;color:#1F8A5B}\n.c-bad{background:#FBE8E6;color:#B42318}\n.c-warn{background:#FFF1DC;color:#C77A00}\n.c-info{background:#E3EEFB;color:#2A6FDB}\n.c-neu{background:#F4F2EE;color:#8C8579}\n.c-purple{background:#ece9f8;color:#5b4ec8}\n\n/* ── Avatars ───────────────────────────────────── */\n.av{width:36px;height:36px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}\n.av-neu{background:#E9E6E0;color:#5F5A52}\n.av-gold{background:#F4D58A;color:#5F3F00}\n.av-lg{width:52px;height:52px;font-size:16px}\n.av-sm{width:26px;height:26px;font-size:10px}\n.av-xs{width:20px;height:20px;font-size:8px}\n.av-stack{display:flex}\n.av-stack .av{margin-left:-8px;border:2px solid #fff}\n.av-stack .av:first-child{margin-left:0}\n\n/* ── Inputs ────────────────────────────────────── */\n.inp{height:38px;padding:0 14px;border:1.5px solid #E9E6E0;border-radius:10px;background:#fff;font-family:'Manrope',-apple-system,sans-serif;font-size:13px;color:#0E0E10;width:100%;outline:none}\n.inp-focus{border-color:#E8A317;box-shadow:0 0 0 3px rgba(232,163,23,.28)}\n.inp-err{border-color:#B42318}\n.inp-dis{opacity:.45;background:#F4F2EE;cursor:not-allowed}\n.inp-label{font-size:12.5px;font-weight:600;color:#0E0E10;display:block;margin-bottom:5px}\n.inp-hint{font-size:11.5px;color:#8C8579;margin-top:4px}\n.inp-error-msg{font-size:11.5px;color:#B42318;margin-top:4px}\n.inp-group{margin-bottom:14px}\n.inp-addon{display:flex}\n.addon-l,.addon-r{height:38px;padding:0 11px;background:#F4F2EE;border:1.5px solid #E9E6E0;display:flex;align-items:center;font-size:12.5px;color:#8C8579;font-weight:500}\n.addon-l{border-right:none;border-radius:10px 0 0 10px}\n.addon-r{border-left:none;border-radius:0 10px 10px 0}\n.inp-addon .inp{border-radius:0;flex:1}\n\n/* ── Progress ──────────────────────────────────── */\n.pr-bar{border-radius:999px;background:#E9E6E0;overflow:hidden}\n.pr-fill{border-radius:999px}\n.pr-h4{height:4px}.pr-h6{height:6px}.pr-h8{height:8px}.pr-h12{height:12px}\n.pr-ok{background:#1F8A5B}.pr-warn{background:#E8A317}.pr-bad{background:#B42318}\n\n/* ── Radius ────────────────────────────────────── */\n.rad-demo{background:#F4D58A;border:1.5px solid #E8A317;width:64px;height:64px;margin:0 auto 6px}\n\n/* ── Shadow ────────────────────────────────────── */\n.sh-demo{background:#fff;border-radius:10px;height:64px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#8C8579;font-weight:600}\n\n/* ── Tabs ──────────────────────────────────────── */\n.tabs-spec{display:flex;border-bottom:1.5px solid #E9E6E0}\n.tab-sp{padding:9px 14px;font-size:13px;font-weight:500;color:#8C8579;border-bottom:2px solid transparent;margin-bottom:-1.5px;cursor:default}\n.tab-sp.on{color:#5F3F00;border-bottom-color:#E8A317;font-weight:700}\n\n/* ── Sidebar specimen ──────────────────────────── */\n.sb-sp{background:#1A1814;border-radius:10px;padding:8px;width:100%}\n.sb-sp-sec{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.28);padding:10px 10px 3px}\n.sb-sp-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.6)}\n.sb-sp-item.on{background:#E8A317;color:#1A1814;font-weight:700}\n.sb-sp-item svg{width:14px;height:14px;flex-shrink:0}\n\n/* ── Spacing ruler ─────────────────────────────── */\n.sp-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid #F4F2EE}\n.sp-row:last-child{border-bottom:none}\n.sp-tok{font-family:'Courier New',monospace;font-size:11.5px;color:#5F5A52;min-width:100px}\n.sp-px{font-size:11.5px;color:#8C8579;min-width:36px}\n.sp-bar-wrap{flex:1}\n.sp-bar{height:8px;background:#E8A317;border-radius:2px}\n\n/* ── KPI card ──────────────────────────────────── */\n.kpi-sp{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E9E6E0;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(14,14,16,.05)}\n.kpi-sp-ico{color:#E8A317;flex-shrink:0}\n.kpi-sp-ico svg{width:32px;height:32px;stroke-width:1.5}\n.kpi-sp-lbl{font-size:11px;color:#8C8579}\n.kpi-sp-val{font-size:24px;font-weight:800;letter-spacing:-.025em;font-variant-numeric:tabular-nums}\n.kpi-sp-foot{font-size:11px;margin-top:2px}\n.kpi-sp-foot.ok{color:#1F8A5B}.kpi-sp-foot.warn{color:#C77A00}.kpi-sp-foot.bad{color:#B42318}\n\n/* ── Icon tile ─────────────────────────────────── */\n.ico-tile{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;background:#fff;border:1px solid #E9E6E0;border-radius:8px}\n.ico-tile svg{width:20px;height:20px;color:#403D38}\n.ico-tile span{font-size:9.5px;color:#B6B0A4;font-family:'Courier New',monospace;text-align:center}\n\n/* ── Icon pastille ─────────────────────────────── */\n.ico-pill{width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.ico-pill s
