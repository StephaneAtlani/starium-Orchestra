# =============================================================================
# Starium Orchestra — Docker Compose (Dev)
# =============================================================================
#
# Objectif : lancer un environnement dev avec hot reload côté Docker
# (Nest watch + Next dev), sans utiliser les `profiles`.
#
# Usage :
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Docker Desktop : ne pas lancer seulement postgres/mailhog/api-dev — le service
# « redis » doit tourner sur la même stack, sinon l’API (BullMQ) : ENOTFOUND redis.
#
# Ports :
#   - Web (Next dev)  : http://localhost:3000
#   - API (Nest dev)  : http://localhost:3001/api
#   - Postgres         : localhost:5432
#   - MailHog (SMTP capture + UI) : http://localhost:8025 — SMTP pour l’API : mailhog:1025 (voir env api-dev)
#   - Vérification identités e-mail : URLs / TTL / cooldown via variables racine (.env) — voir bloc api-dev.
#   - Redis (BullMQ / RFC-038) : service `redis` (port 6379 publié). L’API utilise
#     host.docker.internal:6379 pour éviter ENOTFOUND « redis » si Docker Desktop
#     ne met pas api-dev sur le même réseau DNS que Redis.
#
# Notes :
# - Le fichier `.env` à la racine du repo est lu par Compose pour `${VAR:-défaut}` sur api-dev (ne pas confondre avec apps/api/.env).
# - Compose injecte aussi `apps/api/.env` via `env_file` sur api-dev.
# - Les clés du bloc `environment` priment sur `env_file` : ne pas y redéfinir
#   PROCUREMENT_S3_* (sinon elles écrasent apps/api/.env, ex. région eu-west-3 → us-east-1).
# =============================================================================

name: starium-orchestra

networks:
  orchestra_dev:
    driver: bridge

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-redis-healthcheck: &redis-healthcheck
  test: ["CMD", "redis-cli", "ping"]
  interval: 2s
  timeout: 3s
  retries: 10

x-api-base-env: &api-base-env
  DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
  PORT: "3001"

services:
  postgres:
    networks: [orchestra_dev]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  mailhog:
    networks: [orchestra_dev]
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    networks: [orchestra_dev]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck: *redis-healthcheck


  api-dev:
    networks: [orchestra_dev]
    # Linux / Docker Desktop : accès à l’hôte (port 6379 → conteneur redis).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    command: ["sh", "/app/apps/api/docker-entrypoint-dev.sh"]
    env_file:
      - apps/api/.env
    environment:
      # Écrase le DATABASE_URL/PORT pour le réseau Docker.
      <<: *api-base-env
      # MailHog : emails dev (MFA OTP, etc.) — UI http://localhost:8025
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: noreply@starium.local
      # BullMQ / RFC-038 : via l’hôte (port publié) — évite ENOTFOUND sur le hostname « redis » (réseau Desktop).
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "6379"
      # Vérification identités e-mail (RFC) — surcharges via .env racine si besoin.
      EMAIL_IDENTITY_VERIFY_SUCCESS_URL: ${EMAIL_IDENTITY_VERIFY_SUCCESS_URL:-http://localhost:3000/account?emailVerified=1}
      EMAIL_IDENTITY_VERIFY_ERROR_URL: ${EMAIL_IDENTITY_VERIFY_ERROR_URL:-http://localhost:3000/account?emailVerified=0}
      EMAIL_IDENTITY_VERIFY_TOKEN_TTL_HOURS: ${EMAIL_IDENTITY_VERIFY_TOKEN_TTL_HOURS:-24}
      EMAIL_IDENTITY_VERIFY_RESEND_COOLDOWN_MINUTES: ${EMAIL_IDENTITY_VERIFY_RESEND_COOLDOWN_MINUTES:-15}
      # 1 / true = pas de délai entre renvois du lien (dev uniquement, ignoré en prod côté app).
      STARIUM_SKIP_EMAIL_IDENTITY_RESEND_COOLDOWN: ${STARIUM_SKIP_EMAIL_IDENTITY_RESEND_COOLDOWN:-1}
      # Ne pas définir PROCUREMENT_STORAGE_DRIVER ici : le driver suit `PlatformProcurementS3Settings.storageDriver` (admin).
      # PROCUREMENT_STORAGE_DRIVER ne s’applique qu’en repli si la ligne plateforme est absente (bootstrap / tests).
      PROCUREMENT_LOCAL_ROOT: /data/procurement-blobs
      # PROCUREMENT_S3_* : uniquement dans apps/api/.env (sinon ce bloc écrase env_file — buckets créés dans la mauvaise région).
    ports:
      - "3001:3001"
    volumes:
      # Manifestes workspace : sans ça, pnpm install lit le package.json figé dans l’image
      # (deps ajoutées sur l’hôte invisibles → Nest ne compile pas → rien sur :3001).
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./apps/api/package.json:/app/apps/api/package.json:ro
      - ./apps/web/package.json:/app/apps/web/package.json:ro
      - ./packages/types/package.json:/app/packages/types/package.json:ro
      - ./packages/config/package.json:/app/packages/config/package.json:ro
      # Package workspace (RFC-023) : sans montage, l’image peut être vieille → pnpm ne voit pas le projet (TS2307).
      - ./packages/budget-exercise-calendar:/app/packages/budget-exercise-calendar
      - ./apps/api/docker-entrypoint-dev.sh:/app/apps/api/docker-entrypoint-dev.sh:ro
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - procurement_blobs:/data/procurement-blobs
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  web-dev:
    networks: [orchestra_dev]
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    environment:
      # Ligne de requête OAuth (code=…) peut dépassir 16 Ko (défaut Node) → « invalid response ».
      NODE_OPTIONS: "--max-http-header-size=262144"
      # Client (navigateur) : API publiée sur l’hôte (ports api-dev 3001:3001). Ne pas mettre le hostname Docker ici.
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Serveur Next (rewrites /api/* → Nest) : URL atteignable depuis le conteneur web uniquement.
      INTERNAL_API_URL: http://api-dev:3001
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - web_next_cache:/app/apps/web/.next
      - ./packages/budget-exercise-calendar:/app/packages/budget-exercise-calendar
    depends_on:
      api-dev:
        condition: service_healthy

volumes:
  postgres_data: {}
  minio_data: {}
  procurement_blobs: {}
  web_next_cache: {}

