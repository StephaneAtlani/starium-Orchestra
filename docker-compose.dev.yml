# =============================================================================
# Starium Orchestra — Docker Compose (Dev)
# =============================================================================
#
# Objectif : lancer un environnement dev avec hot reload côté Docker
# (Nest watch + Next dev), sans utiliser les `profiles`.
#
# Usage :
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Ports :
#   - Web (Next dev)  : http://localhost:3000
#   - API (Nest dev)  : http://localhost:3001/api
#   - Postgres         : localhost:5432
#   - MailHog (SMTP capture + UI) : http://localhost:8025 — SMTP pour l’API : mailhog:1025 (voir env api-dev)
#
# Notes :
# - Le fichier .env n'est pas packagé dans l'image (voir .dockerignore).
#   Compose injecte `apps/api/.env` via `env_file`.
# =============================================================================

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U starium -d starium"]
  interval: 2s
  timeout: 5s
  retries: 5

x-api-base-env: &api-base-env
  DATABASE_URL: postgresql://starium:starium@postgres:5432/starium
  PORT: "3001"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: starium
      POSTGRES_PASSWORD: starium
      POSTGRES_DB: starium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # RFC-034 — MinIO interne Docker (pas de publication hôte).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-starium_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-starium_minio_dev_only}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  api-dev:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    command: ["sh", "/app/apps/api/docker-entrypoint-dev.sh"]
    env_file:
      - apps/api/.env
    environment:
      # Écrase le DATABASE_URL/PORT pour le réseau Docker.
      <<: *api-base-env
      # MailHog : emails dev (MFA OTP, etc.) — UI http://localhost:8025
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: noreply@starium.local
      PROCUREMENT_S3_ENDPOINT: http://minio:9000
      PROCUREMENT_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-starium_minio}
      PROCUREMENT_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-starium_minio_dev_only}
      PROCUREMENT_S3_BUCKET: ${PROCUREMENT_S3_BUCKET:-starium-procurement}
      PROCUREMENT_S3_REGION: ${PROCUREMENT_S3_REGION:-us-east-1}
      PROCUREMENT_S3_USE_SSL: "false"
      PROCUREMENT_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "3001:3001"
    volumes:
      # Manifestes workspace : sans ça, pnpm install lit le package.json figé dans l’image
      # (deps ajoutées sur l’hôte invisibles → Nest ne compile pas → rien sur :3001).
      - ./package.json:/app/package.json:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./apps/api/package.json:/app/apps/api/package.json:ro
      - ./apps/web/package.json:/app/apps/web/package.json:ro
      - ./packages/types/package.json:/app/packages/types/package.json:ro
      - ./packages/config/package.json:/app/packages/config/package.json:ro
      # Package workspace (RFC-023) : sans montage, l’image peut être vieille → pnpm ne voit pas le projet (TS2307).
      - ./packages/budget-exercise-calendar:/app/packages/budget-exercise-calendar
      - ./apps/api/docker-entrypoint-dev.sh:/app/apps/api/docker-entrypoint-dev.sh:ro
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  web-dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    environment:
      # Ligne de requête OAuth (code=…) peut dépassir 16 Ko (défaut Node) → « invalid response ».
      NODE_OPTIONS: "--max-http-header-size=262144"
      # Client (navigateur) : API publiée sur l’hôte (ports api-dev 3001:3001). Ne pas mettre le hostname Docker ici.
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Serveur Next (rewrites /api/* → Nest) : URL atteignable depuis le conteneur web uniquement.
      INTERNAL_API_URL: http://api-dev:3001
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - web_next_cache:/app/apps/web/.next
      - ./packages/budget-exercise-calendar:/app/packages/budget-exercise-calendar
    depends_on:
      api-dev:
        condition: service_healthy

volumes:
  postgres_data: {}
  minio_data: {}
  web_next_cache: {}

